name: Terraform Plan & Deploy
run-name: "TF: ${{ inputs.action }} — ${{ inputs.template }}_${{ inputs.cloud }} (by @${{ github.actor }})"

on:
  workflow_dispatch:
    inputs:
      template:
        description: "Template"
        required: true
        type: choice
        options:
          - Test_Net
          - Test_K8S
      cloud:
        description: "Cloud"
        required: true
        type: choice
        options:
          - OVH
          - Azure
      action:
        description: "Action"
        required: true
        type: choice
        default: "plan"
        options:
          - plan
          - deploy
          - destroy

jobs:
  terraform:
    name: "${{ inputs.action }} — ${{ inputs.template }}_${{ inputs.cloud }}"
    runs-on: ubuntu-latest

    env:
      TEMPLATE_DIR: templates/test/${{ inputs.template }}_${{ inputs.cloud }}
      # OVH provider
      OVH_ENDPOINT:           ${{ vars.OVH_ENDPOINT }}
      OVH_APPLICATION_KEY:    ${{ secrets.OVH_APPLICATION_KEY }}
      OVH_APPLICATION_SECRET: ${{ secrets.OVH_APPLICATION_SECRET }}
      OVH_CONSUMER_KEY:       ${{ secrets.OVH_CONSUMER_KEY }}
      # S3 state backend
      AWS_ACCESS_KEY_ID:      ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:  ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      # OpenStack provider
      OS_USERNAME:            ${{ secrets.OS_USERNAME }}
      OS_PASSWORD:            ${{ secrets.OS_PASSWORD }}
      # GitOps / Flux (Test_K8S) — ignored by Terraform if variable not declared
      TF_VAR_netic_git_username: ${{ secrets.TF_VAR_NETIC_GIT_USERNAME }}
      TF_VAR_netic_git_token:    ${{ secrets.TF_VAR_NETIC_GIT_TOKEN }}
      TF_VAR_gitops_ssh_key:     ${{ secrets.TF_VAR_GITOPS_SSH_KEY }}
      # Azure provider — required by module wrappers even on OVH deployments
      ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID:       ${{ vars.ARM_TENANT_ID }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Guardrail — block destroy without confirmation
        if: ${{ inputs.action == 'destroy' }}
        run: |
          echo "::warning::Running DESTROY on ${{ inputs.template }}_${{ inputs.cloud }}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Copy shared Terraform files into template
        run: |
          SHARED="templates/test"
          cp "$SHARED/providers.tf"       "$TEMPLATE_DIR/providers.tf"
          cp "$SHARED/backend.tf"         "$TEMPLATE_DIR/backend.tf"
          cp "$SHARED/common.auto.tfvars" "$TEMPLATE_DIR/common.auto.tfvars"

      - name: Terraform Init
        working-directory: ${{ env.TEMPLATE_DIR }}
        run: |
          terraform init -backend-config="key=$TEMPLATE_DIR/terraform.tfstate"

      - name: Terraform Validate
        working-directory: ${{ env.TEMPLATE_DIR }}
        run: terraform validate

      - name: Terraform Plan
        if: ${{ inputs.action != 'destroy' }}
        working-directory: ${{ env.TEMPLATE_DIR }}
        run: terraform plan -out=tfplan

      - name: Upload Plan Artifact
        if: ${{ inputs.action != 'destroy' }}
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.template }}_${{ inputs.cloud }}
          path: ${{ env.TEMPLATE_DIR }}/tfplan

      - name: Terraform Apply
        if: ${{ inputs.action == 'deploy' }}
        working-directory: ${{ env.TEMPLATE_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Save kubeconfig
        if: ${{ inputs.action == 'deploy' && inputs.template == 'Test_K8S' }}
        working-directory: ${{ env.TEMPLATE_DIR }}
        run: terraform output -raw kubeconfig > kubeconfig.yaml

      # kubeconfig gemmes ikke i repo af sikkerhedshensyn — kun tilgængelig som artifact i kort tid
      - name: Upload kubeconfig
        if: ${{ inputs.action == 'deploy' && inputs.template == 'Test_K8S' }}
        uses: actions/upload-artifact@v4
        with:
          name: kubeconfig-${{ inputs.template }}_${{ inputs.cloud }}
          path: ${{ env.TEMPLATE_DIR }}/kubeconfig.yaml
          retention-days: 1

      - name: Terraform Destroy
        if: ${{ inputs.action == 'destroy' }}
        working-directory: ${{ env.TEMPLATE_DIR }}
        run: terraform destroy -auto-approve
