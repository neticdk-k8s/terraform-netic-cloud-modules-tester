name: Terraform Plan & Deploy Selector

on:
  workflow_dispatch:
    inputs:
      customer:
        description: "Customer name"
        required: true
        type: choice
        options:
          - netictest

      environment:
        description: "Environment"
        required: true
        type: choice
        options:
          - test
          - prod
          - dev

      module:
        description: "Infrastructure to deploy"
        required: true
        type: choice
        options:
          - network
          - storage
          - compute

      action:
        description: "Plan or Deploy"
        required: true
        type: choice
        default: "plan"
        options:
          - plan
          - deploy

env:
  TF_VERSION: "1.8.5"

jobs:
  terraform:
    name: "Terraform: ${{ github.event.inputs.customer }} - ${{ github.event.inputs.environment }} - ${{ github.event.inputs.module }}"
    runs-on: ubuntu-latest

    env:
      OVH_ENDPOINT: ${{ vars.OVH_ENDPOINT }}
      OVH_APPLICATION_KEY: ${{ secrets.OVH_APPLICATION_KEY }}
      OVH_APPLICATION_SECRET: ${{ secrets.OVH_APPLICATION_SECRET }}
      OVH_CONSUMER_KEY: ${{ secrets.OVH_CONSUMER_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # -------------------------------------------------------------
      # Terraform variables
      # -------------------------------------------------------------
      #TF_VAR_OS_user: ${{ secrets.OS_USER }}               # Gemt som Secret
      #TF_VAR_OS_password: ${{ secrets.OS_PASSWORD }}       # Gemt som Secret
      
      # TF_VAR_ovh_project_name: ${{ vars.OVH_PROJECT_NAME }} # Gemt som Variable
      # TF_VAR_ovh_project_id: ${{ vars.OVH_PROJECT_ID }}     # Gemt som Variable
      

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Set Terraform directory
        id: tfdir
        run: |
          TF_DIR="customers/${{ github.event.inputs.customer }}/${{ github.event.inputs.environment }}/${{ github.event.inputs.module }}"

          if [ ! -d "$TF_DIR" ]; then
            echo "Directory not found: $TF_DIR"
            exit 1
          fi

          echo "dir=$TF_DIR" >> $GITHUB_OUTPUT

      - name: Verify shared Terraform files exist
        run: |
          SHARED_DIR="customers/${{ github.event.inputs.customer }}/${{ github.event.inputs.environment }}"
          
          if [ ! -f "$SHARED_DIR/providers.tf" ]; then
            echo "Missing shared provider file: $SHARED_DIR/providers.tf"
            exit 1
          fi

          if [ ! -f "$SHARED_DIR/backend.tf" ]; then
            echo "Missing shared backend file: $SHARED_DIR/backend.tf"
            exit 1
          fi

          if [ ! -f "$SHARED_DIR/common.auto.tfvars" ]; then
            echo "Missing shared variables file: $SHARED_DIR/common.auto.tfvars"
            exit 1
          fi

      - name: Copy shared Terraform configuration
        run: |
          SHARED_DIR="customers/${{ github.event.inputs.customer }}/${{ github.event.inputs.environment }}"
          TARGET_DIR="${{ steps.tfdir.outputs.dir }}"
          
          cp "$SHARED_DIR/providers.tf" "$TARGET_DIR/providers.tf"
          cp "$SHARED_DIR/backend.tf" "$TARGET_DIR/backend.tf"
          cp "$SHARED_DIR/common.auto.tfvars" "$TARGET_DIR/common.auto.tfvars"
 
      - name: Terraform Init
        working-directory: ${{ steps.tfdir.outputs.dir }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ steps.tfdir.outputs.dir }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ steps.tfdir.outputs.dir }}
        run: terraform plan -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.customer }}-${{ github.event.inputs.environment }}-${{ github.event.inputs.module }}
          path: ${{ steps.tfdir.outputs.dir }}/tfplan

      - name: Terraform Apply (Deploy)
        if: ${{ github.event.inputs.action == 'deploy' }}
        working-directory: ${{ steps.tfdir.outputs.dir }}
        run: terraform apply -auto-approve tfplan