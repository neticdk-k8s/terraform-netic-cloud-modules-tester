name: Terraform Plan & Deploy Selector

on:
  workflow_dispatch:
    inputs:
      customer:
        description: "Customer name"
        required: true
        type: choice
        options:
          - netictest

      environment:
        description: "Environment"
        required: true
        type: choice
        options:
          - test
          - prod
          - dev

      module:
        description: "Infrastructure to deploy"
        required: true
        type: choice
        options:
          - network
          - container_registry
          - vm
          - storage

      action:
        description: "Plan, Deploy or Destroy"
        required: true
        type: choice
        default: "plan"
        options:
          - plan
          - deploy
          - destroy 
      debug:
        description: 'Enable Terraform Debug Log'
        required: true
        type: boolean
        default: false

env:
  TF_VERSION: "1.8.5"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

  ## Debug info for terraform if needed
  TF_LOG: ${{ github.event.inputs.debug == 'true' && 'DEBUG' || '' }}


jobs:
  terraform:
    name: "Terraform: ${{ github.event.inputs.customer }} - ${{ github.event.inputs.environment }} - ${{ github.event.inputs.module }} (${{ github.event.inputs.action }})"
    runs-on: ubuntu-latest

    env:
      OVH_ENDPOINT: ${{ vars.OVH_ENDPOINT }}
      OVH_APPLICATION_KEY: ${{ secrets.OVH_APPLICATION_KEY }}
      OVH_APPLICATION_SECRET: ${{ secrets.OVH_APPLICATION_SECRET }}
      OVH_CONSUMER_KEY: ${{ secrets.OVH_CONSUMER_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      ## OpenStack values.  Not working with env variables, but this step sets variables in terraform directly
      TF_VAR_OS_username: ${{ secrets.OS_USERNAME }}
      TF_VAR_OS_password: ${{ secrets.OS_PASSWORD }}


    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Guardrail - Block Prod Destroy
        if: ${{ github.event.inputs.action == 'destroy' && github.event.inputs.environment == 'prod' }}
        run: |
          echo "::error::DESTROY IS NOT ALLOWED ON PRODUCTION ENVIRONMENTS!"
          exit 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Set Terraform directory
        id: tfdir
        run: |
          TF_DIR="customers/${{ github.event.inputs.customer }}/${{ github.event.inputs.environment }}/${{ github.event.inputs.module }}"

          if [ ! -d "$TF_DIR" ]; then
            echo "Directory not found: $TF_DIR"
            exit 1
          fi

          echo "dir=$TF_DIR" >> $GITHUB_OUTPUT

      - name: Verify shared Terraform files exist
        run: |
          SHARED_DIR="customers/${{ github.event.inputs.customer }}/${{ github.event.inputs.environment }}"
          
          if [ ! -f "$SHARED_DIR/providers.tf" ]; then
            echo "Missing shared provider file: $SHARED_DIR/providers.tf"
            exit 1
          fi

          if [ ! -f "$SHARED_DIR/backend.tf" ]; then
            echo "Missing shared backend file: $SHARED_DIR/backend.tf"
            exit 1
          fi

          if [ ! -f "$SHARED_DIR/common.auto.tfvars" ]; then
            echo "Missing shared variables file: $SHARED_DIR/common.auto.tfvars"
            exit 1
          fi

      - name: Copy shared Terraform configuration
        run: |
          SHARED_DIR="customers/${{ github.event.inputs.customer }}/${{ github.event.inputs.environment }}"
          TARGET_DIR="${{ steps.tfdir.outputs.dir }}"
          
          cp "$SHARED_DIR/providers.tf" "$TARGET_DIR/providers.tf"
          cp "$SHARED_DIR/backend.tf" "$TARGET_DIR/backend.tf"
          cp "$SHARED_DIR/common.auto.tfvars" "$TARGET_DIR/common.auto.tfvars"
 
      - name: Terraform Init
        working-directory: ${{ steps.tfdir.outputs.dir }}
        run: |
          STATE_KEY="customers/${{ github.event.inputs.customer }}/${{ github.event.inputs.environment }}/${{ github.event.inputs.module }}/terraform.tfstate"
          echo "Dynamically assigning state storage path to: $STATE_KEY"
          terraform init -backend-config="key=$STATE_KEY"

      - name: Terraform Validate
        working-directory: ${{ steps.tfdir.outputs.dir }}
        run: terraform validate

      - name: Terraform Plan
        if: ${{ github.event.inputs.action != 'destroy' }}
        working-directory: ${{ steps.tfdir.outputs.dir }}
        run: terraform plan -out=tfplan

      #- name: Terraform Destroy Plan
      #  if: ${{ github.event.inputs.action == 'destroy' }}
      #  working-directory: ${{ steps.tfdir.outputs.dir }}
      #  run: terraform plan -destroy
 
      - name: Upload Plan Artifact
        if: ${{ github.event.inputs.action != 'destroy' }}
        uses: actions/upload-artifact@v6
        with:
          name: tfplan-${{ github.event.inputs.customer }}-${{ github.event.inputs.environment }}-${{ github.event.inputs.module }}
          path: ${{ steps.tfdir.outputs.dir }}/tfplan

      - name: Terraform Apply (Deploy)
        if: ${{ github.event.inputs.action == 'deploy' }}
        working-directory: ${{ steps.tfdir.outputs.dir }}
        run: terraform apply -auto-approve tfplan

      # Must specify common.auto.tfvars, otherwise os_username and os_password is unknowm for OpenStack provider
      - name: Terraform Destroy (Execute)
        if: ${{ github.event.inputs.action == 'destroy' }}
        working-directory: ${{ steps.tfdir.outputs.dir }}
        run: terraform destroy -auto-approve -var-file="../common.auto.tfvars"