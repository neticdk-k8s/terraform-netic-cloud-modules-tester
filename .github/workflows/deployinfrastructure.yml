name: OpenTofu Plan & Deploy
run-name: "Tofu: ${{ inputs.action }} — ${{ inputs.template }}_${{ inputs.cloud }}_${{ inputs.branch }} (by @${{ github.actor }})"

on:
  workflow_dispatch:
    inputs:
      template:
        description: "Template"
        required: true
        type: choice
        options:
          - Test_Net
          - Test_K8S_Simpel
          - Test_K8S_Contain
      cloud:
        description: "Cloud"
        required: true
        type: choice
        options:
          - OVH
          - Azure
      branch:
        description: "Branch"
        required: true
        default: "main"
        type: string
      action:
        description: "Action"
        required: true
        type: choice
        default: "plan"
        options:
          - plan
          - deploy
          - destroy

jobs:
  opentofu:
    name: "${{ inputs.action }} — ${{ inputs.template }}_${{ inputs.cloud }}"
    runs-on: ubuntu-latest

    env:
      TEMPLATE_DIR: templates/test/${{ inputs.template }}_${{ inputs.cloud }}
      # OVH provider — TF_VAR_ovh_api_region styrer provider-endpoint (providers.tf),
      # OVH_ENDPOINT alene bruges ikke, da provideren sætter endpoint eksplicit
      OVH_ENDPOINT:           ${{ vars.OVH_ENDPOINT }}
      TF_VAR_ovh_api_region:  ${{ vars.OVH_ENDPOINT }}
      OVH_APPLICATION_KEY:    ${{ secrets.OVH_APPLICATION_KEY }}
      OVH_APPLICATION_SECRET: ${{ secrets.OVH_APPLICATION_SECRET }}
      OVH_CONSUMER_KEY:       ${{ secrets.OVH_CONSUMER_KEY }}
      # S3 state backend
      AWS_ACCESS_KEY_ID:      ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:  ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      BUCKET_NAME:            ${{ vars.BUCKET_NAME }}
      # OpenStack provider
      OS_USERNAME:            ${{ secrets.OS_USERNAME }}
      OS_PASSWORD:            ${{ secrets.OS_PASSWORD }}
      # GitOps / Flux (Test_K8S) — TF_VAR_* læses også af OpenTofu; ignoreres hvis variablen ikke er deklareret
      TF_VAR_netic_git_username: ${{ secrets.TF_VAR_NETIC_GIT_USERNAME }}
      TF_VAR_netic_git_token:    ${{ secrets.TF_VAR_NETIC_GIT_TOKEN }}
      TF_VAR_gitops_ssh_key:     ${{ secrets.TF_VAR_GITOPS_SSH_KEY }}
      # Azure provider — required by module wrappers even on OVH deployments
      ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID:       ${{ vars.ARM_TENANT_ID }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.branch }}

      - name: Guardrail — block destroy without confirmation
        if: ${{ inputs.action == 'destroy' }}
        run: |
          echo "::warning::Running DESTROY on ${{ inputs.template }}_${{ inputs.cloud }}"

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Copy shared OpenTofu files into template
        run: |
          SHARED="templates/test"
          cp "$SHARED/providers.tf"       "$TEMPLATE_DIR/providers.tf"
          cp "$SHARED/backend.tf"         "$TEMPLATE_DIR/backend.tf"
          cp "$SHARED/common.auto.tfvars" "$TEMPLATE_DIR/common.auto.tfvars"

      - name: Tofu Init
        working-directory: ${{ env.TEMPLATE_DIR }}
        run: |
          tofu init \
            -backend-config="bucket=$BUCKET_NAME" \
            -backend-config="key=${{ inputs.template }}_${{ inputs.cloud }}_${{ inputs.branch }}/tofu.tfstate"

      - name: Tofu Validate
        working-directory: ${{ env.TEMPLATE_DIR }}
        run: tofu validate

      - name: Tofu Plan
        if: ${{ inputs.action != 'destroy' }}
        working-directory: ${{ env.TEMPLATE_DIR }}
        run: tofu plan -out=tfplan

      - name: Upload Plan Artifact
        if: ${{ inputs.action != 'destroy' }}
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.template }}_${{ inputs.cloud }}
          path: ${{ env.TEMPLATE_DIR }}/tfplan

      - name: Tofu Apply
        if: ${{ inputs.action == 'deploy' }}
        working-directory: ${{ env.TEMPLATE_DIR }}
        run: tofu apply -auto-approve tfplan

      # Konventions-drevet: workflowet kender ikke template-navne, men reagerer på
      # hvilke outputs der findes. Et output der ender på "kubeconfig" bliver en
      # .yaml; eksponerer et template storage_s3_* nøgler, samles de i en .env.
      # Tilføj nye output-typer her ét sted — ikke per-template if's.
      - name: Collect outputs into artifacts
        if: ${{ inputs.action == 'deploy' }}
        working-directory: ${{ env.TEMPLATE_DIR }}
        run: |
          mkdir -p artifacts
          json=$(tofu output -json)

          # Alle *kubeconfig-outputs -> hver sin .yaml
          for name in $(echo "$json" | jq -r 'keys[] | select(endswith("kubeconfig"))'); do
            tofu output -raw "$name" > "artifacts/${name}.yaml"
          done

          # OVH S3-creds hvis template'et eksponerer dem
          if echo "$json" | jq -e 'has("storage_s3_access_key")' >/dev/null; then
            {
              echo "AWS_ACCESS_KEY_ID=$(tofu output -raw storage_s3_access_key)"
              echo "AWS_SECRET_ACCESS_KEY=$(tofu output -raw storage_s3_secret_key)"
            } > artifacts/s3-creds.env
          fi

          # Azure storage connection strings hvis template'et eksponerer dem
          if echo "$json" | jq -e 'has("storage_object_connection_strings")' >/dev/null; then
            tofu output -json storage_object_connection_strings > artifacts/storage-connection-strings.json
          fi

      # =====================================================================
      # ⚠️  MÅ IKKE BRUGES I PRODUKTION
      # Dette uploader hemmeligheder (kubeconfig, S3-nøgler) i KLARTEKST som
      # artifact. Alle med read-adgang til repoet kan hente dem, og de ligger
      # i hele retention-perioden. Kun acceptabelt til kortlivet test-infra.
      #
      # Produktions-alternativer (vælg efter behov):
      #   1. Skriv credentials til en secret-manager (HashiCorp Vault,
      #      Azure Key Vault, AWS Secrets Manager) i stedet for artifact.
      #   2. Push tilbage som GitHub Actions secret via `gh secret set`
      #      (kræver token med secrets:write) — så maskeres de i logs.
      #   3. Brug kortlivede/federerede credentials (OIDC) der udstedes
      #      just-in-time, så intet langlivet hemmeligt behøver opbevares.
      #   4. Undlad helt at eksponere kubeconfig; tilgå clusteret via en
      #      bastion/OIDC-baseret kube-login i stedet.
      # =====================================================================
      - name: Upload outputs (TEST ONLY — se advarsel ovenfor)
        if: ${{ inputs.action == 'deploy' }}
        uses: actions/upload-artifact@v4
        with:
          name: outputs-${{ inputs.template }}_${{ inputs.cloud }}
          path: ${{ env.TEMPLATE_DIR }}/artifacts/
          retention-days: 1
          if-no-files-found: ignore

      - name: Tofu Destroy
        if: ${{ inputs.action == 'destroy' }}
        working-directory: ${{ env.TEMPLATE_DIR }}
        run: tofu destroy -auto-approve
